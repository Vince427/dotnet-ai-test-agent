trigger:
  branches:
    include:
      - main
  paths:
    include:
      - tests/*
      - schemas/*
      - src/AgentRunner/*
      - src/AgentRunner.Tests/*
      - scripts/validate-test-plans.ps1
      - .azure/pipelines/validate-test-plans.yml

pr:
  paths:
    include:
      - tests/*
      - schemas/*
      - src/AgentRunner/*
      - src/AgentRunner.Tests/*
      - scripts/validate-test-plans.ps1
      - .azure/pipelines/validate-test-plans.yml

pool:
  vmImage: windows-latest

steps:
  - task: UseDotNet@2
    displayName: Setup .NET 8
    inputs:
      packageType: sdk
      version: 8.0.x

  - pwsh: .\scripts\validate-test-plans.ps1
    displayName: Validate desktop test plans

  - publish: artifacts/test-plans
    artifact: desktop-test-plan-validation
    displayName: Publish validation artifacts
    condition: always()
