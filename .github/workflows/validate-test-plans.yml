name: Validate desktop test plans

on:
  pull_request:
    paths:
      - 'tests/**'
      - 'schemas/**'
      - 'src/**'
      - 'DesktopAiTestAgent.sln'
      - 'scripts/validate-test-plans.ps1'
      - '.github/workflows/validate-test-plans.yml'
  push:
    branches:
      - main
    paths:
      - 'tests/**'
      - 'schemas/**'
      - 'src/**'
      - 'DesktopAiTestAgent.sln'
      - 'scripts/validate-test-plans.ps1'
      - '.github/workflows/validate-test-plans.yml'

jobs:
  validate-test-plans:
    name: Validate YAML plans
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run drift-guard YAML fact-gate
        shell: pwsh
        run: .\scripts\check-yaml-facts.ps1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Build the AGENT for every target framework, including net48 (a fixed product rule). We build
      # the AgentRunner project (it pulls Core + UIAutomation) rather than the whole solution, because
      # the solution also contains the MAUI sample, whose packages need the MAUI workload (not installed
      # on the runner -> NU1015). This covers the net48 health of the actual product without it.
      - name: Build the agent for all target frameworks (incl. net48)
        shell: pwsh
        run: dotnet build src/AgentRunner/AgentRunner.csproj -c Release -v minimal

      - name: Validate test plans
        shell: pwsh
        run: .\scripts\validate-test-plans.ps1

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-test-plan-validation
          path: artifacts/test-plans
          if-no-files-found: error
