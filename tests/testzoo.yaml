suite: testzoo

tests:
  TZ-WINFORMS-NET8-LOGIN-SUCCESS:
    title: "WinForms .NET 8 login succeeds"
    priority: "P0"
    framework: "winforms"
    target_window: "Sample Login App (.NET 8)"
    authoring_agent: "manual"
    risk: "low"
    ci_profile: "local-windows"
    category: "Scenario"
    goal: "Log in using username 'admin' and password 'password123'."
    success_condition: "Login successful"
    max_steps: 8
    allowed_actions: ["EnterText", "Click", "Assert", "Done", "Wait"]
    tags: ["testzoo", "winforms", "net8", "login", "happy-path"]
    existing_tests: []
    blocked_if:
      - "Target window not found"
      - "LLM endpoint returns rate limit errors"

  TZ-WINFORMS-NET8-LOGIN-FAILURE:
    title: "WinForms .NET 8 login rejects invalid credentials"
    priority: "P1"
    framework: "winforms"
    target_window: "Sample Login App (.NET 8)"
    authoring_agent: "manual"
    risk: "medium"
    ci_profile: "local-windows"
    category: "Scenario"
    goal: "Enter username 'admin' and password 'wrong-password', submit the form, and verify that the visible status reports a failed login."
    success_condition: "Login failed"
    max_steps: 8
    allowed_actions: ["EnterText", "Click", "Assert", "Done", "Wait"]
    tags: ["testzoo", "winforms", "net8", "login", "negative"]
    existing_tests: []
    blocked_if:
      - "Target window not found"
